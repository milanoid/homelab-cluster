---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  interval: 30m
  chart:
    spec:
      chart: argo-cd
      version: "9.5.0"
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: argocd
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    configs:
      params:
        server.insecure: true
    dex:
      enabled: false
    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        hostname: argocd.milanoid.net
