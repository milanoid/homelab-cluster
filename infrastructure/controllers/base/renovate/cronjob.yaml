---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
            - name: mint-token
              image: alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
              command: ["/bin/sh", "/scripts/mint-token.sh"]
              env:
                - name: GITHUB_APP_ID
                  valueFrom:
                    configMapKeyRef:
                      name: renovate-configmap
                      key: GITHUB_APP_ID
                - name: GITHUB_INSTALLATION_ID
                  valueFrom:
                    configMapKeyRef:
                      name: renovate-configmap
                      key: GITHUB_INSTALLATION_ID
                - name: GITHUB_APP_KEY
                  valueFrom:
                    secretKeyRef:
                      name: renovate-container-env
                      key: GITHUB_APP_KEY
              volumeMounts:
                - name: shared
                  mountPath: /shared
                - name: mint-script
                  mountPath: /scripts
              securityContext:
                allowPrivilegeEscalation: false

          containers:
            - name: renovate
              image: renovate/renovate:43.111.0@sha256:b70f50fc874a6443809ede68809a9169d8f308418eb2c5cd67ff88edda036f1c
              command: ["/bin/sh", "-c"]
              args:
                - export RENOVATE_TOKEN=$(cat /shared/token) && renovate milanoid-labs/homelab-cluster

              envFrom:
                - configMapRef:
                    name: renovate-configmap
              volumeMounts:
                - name: shared
                  mountPath: /shared
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi

          volumes:
            - name: shared
              emptyDir: {}
            - name: mint-script
              configMap:
                name: renovate-mint-token-script
                defaultMode: 0755

          restartPolicy: Never
