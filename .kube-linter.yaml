---
checks:
  exclude:
    # Homelab doesn't enforce resource quotas
    - "unset-cpu-requirements"
    - "unset-memory-requirements"
    # Apps write to mounted volumes; read-only root fs not enforced
    - "no-read-only-root-fs"
    # Not all apps have probes; not a hard requirement for homelab
    - "no-liveness-probe"
    - "no-readiness-probe"
    # Kustomize injects namespaces at build time; kube-linter scans raw files
    - "dangling-service"
    # linuxserver.io images require root; nginx needs root for port binding
    - "run-as-non-root"
    # Meaningless on a 2-3 node homelab cluster
    - "no-anti-affinity"
