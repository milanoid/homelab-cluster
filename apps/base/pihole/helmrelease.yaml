apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: pihole
spec:
  interval: 30m
  chart:
    spec:
      chart: pihole
      version: "v2.35.0"
      sourceRef:
        kind: HelmRepository
        name: mojo2600
        namespace: pihole
      interval: 12h
  values:
    admin:
      existingSecret: "pihole-password"
      passwordKey: "password"

    # Using existingClaim to preserve data from previous Helm CLI deployment
    # The PVC "pihole" already exists on the cluster (created 34 days ago)
    # This prevents data loss during migration from Helm CLI to Flux GitOps
    persistentVolumeClaim:
      enabled: true
      existingClaim: "pihole"
      size: 500Mi
      accessModes:
        - ReadWriteOnce

    serviceDns:
      mixedService: true
      type: LoadBalancer
      loadBalancerIP: "192.168.1.232"
      externalTrafficPolicy: Local

    serviceWeb:
      type: ClusterIP

    ingress:
      enabled: false

    doh:
      enabled: false

    capabilities:
      add:
        - SYS_TIME
        - SYS_NICE

    podDnsConfig:
      enabled: true
      policy: "None"
      nameservers:
        - 127.0.0.1
        - 8.8.8.8

    dnsmasq:
      customSettings: |
        dns-forward-max=300

    extraEnvVars:
      TZ: Europe/Prague
      FTLCONF_dns_upstreams: "127.0.0.1#5335"

    extraContainers:
      - name: unbound
        image: mvance/unbound:1.21.1
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 5335
            protocol: TCP
          - containerPort: 5335
            protocol: UDP
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 1000
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        volumeMounts:
          - name: unbound-config
            mountPath: /opt/unbound/etc/unbound/
            readOnly: true
        readinessProbe:
          exec:
            command: ["drill", "-p", "5335", "cloudflare.com", "@127.0.0.1"]
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        livenessProbe:
          exec:
            command: ["drill", "-p", "5335", "cloudflare.com", "@127.0.0.1"]
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5

    # dict format: keys become volume names (chart template: range $key, $value)
    extraVolumes:
      unbound-config:
        configMap:
          name: pihole-unbound-config

    nodeSelector:
      kubernetes.io/hostname: hpmini02

