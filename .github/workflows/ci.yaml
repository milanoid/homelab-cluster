name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: homelab-runners
    container: pipelinecomponents/yamllint:latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .

  kubeconform:
    name: Kubeconform
    runs-on: homelab-runners
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install kustomize and kubeconform
        run: |
          KUSTOMIZE_VERSION="5.6.0"
          KUBECONFORM_VERSION="0.6.7"
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate kustomize overlays
        run: |
          set -euo pipefail
          for overlay in \
            apps/staging \
            infrastructure/controllers/staging \
            monitoring/controllers/staging \
            monitoring/configs/staging \
            persistent-volumes/staging; do
            echo "--- Validating $overlay ---"
            kustomize build --load-restrictor LoadRestrictionsNone "$overlay" | kubeconform \
              --ignore-missing-schemas \
              --kubernetes-version 1.32.0 \
              --summary
          done

  kube-linter:
    name: Kube Linter
    runs-on: homelab-runners
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run kube-linter
        uses: stackrox/kube-linter-action@4586e0224d31e1aa7798b8cb2e3817c6a93ff2ec # v1
        with:
          directory: .
          config: .kube-linter.yaml
